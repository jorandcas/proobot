version: "3.8"

services:
  # ============================================
  # PostgreSQL - Base de datos
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: movistar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-movistar_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movistar-network

  # ============================================
  # Redis - Cola de trabajos
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: movistar-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movistar-network

  # ============================================
  # Backend API
  # ============================================
  backend:
    image: ghcr.io/tu-usuario/movistar-backend:latest
    container_name: movistar-backend
    environment:
      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-movistar_bot}"

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      # Server
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}

      # Workers
      WORKER_CHECK_INTERVAL: ${WORKER_CHECK_INTERVAL:-60000}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-120000}
      CLEAN_INTERVAL: ${CLEAN_INTERVAL:-3600000}
      MAX_JOB_AGE: ${MAX_JOB_AGE:-604800000}
      MAX_EVIDENCE_AGE: ${MAX_EVIDENCE_AGE:-604800000}

      # Evidence
      EVIDENCE_PATH: /app/uploads/evidence
      EVIDENCE_URL_PREFIX: /evidence

      # Worker Monitor
      ENABLE_WORKER_MONITOR: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evidence_data:/app/uploads/evidence
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - movistar-network

  # ============================================
  # Frontend (Promotores)
  # ============================================
  frontend:
    image: ghcr.io/tu-usuario/movistar-frontend:latest
    container_name: movistar-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - movistar-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evidence_data:
    driver: local

networks:
  movistar-network:
    driver: bridge
